<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <!-- 核心模块渐变 -->
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
    
    <!-- 抽象层渐变 -->
    <linearGradient id="abstractGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0e7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7d2fe;stop-opacity:1" />
    </linearGradient>
    
    <!-- 期货渐变 -->
    <linearGradient id="futuresGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    
    <!-- 证券渐变 -->
    <linearGradient id="securitiesGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d1fae5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a7f3d0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#f8fafc"/>
  
  <!-- 标题 -->
  <text x="700" y="40" text-anchor="middle" fill="white" font-size="36" font-weight="bold" font-family="Arial, sans-serif">QuantNova</text>
  <text x="700" y="70" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="18" font-family="Arial, sans-serif">推理重于规则的量化交易决策辅助系统 - 期货+证券双市场</text>
  <text x="700" y="95" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="14" font-family="Arial, sans-serif">v3.0.0 | 659+ 测试 | 双子系统架构</text>
  
  <!-- 共享核心模块 -->
  <rect x="50" y="130" width="1300" height="120" rx="10" fill="url(#coreGradient)" stroke="#3b82f6" stroke-width="2"/>
  <text x="700" y="155" text-anchor="middle" fill="#1e40af" font-size="18" font-weight="bold" font-family="Arial, sans-serif">共享核心模块 (Shared Core)</text>
  
  <!-- 核心模块内容 -->
  <rect x="80" y="170" width="200" height="60" rx="5" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="180" y="195" text-anchor="middle" fill="#1e40af" font-size="14" font-weight="bold" font-family="Arial, sans-serif">推理引擎</text>
  <text x="180" y="215" text-anchor="middle" fill="#6b7280" font-size="12" font-family="Arial, sans-serif">ReasoningEngine</text>
  
  <rect x="300" y="170" width="200" height="60" rx="5" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="400" y="195" text-anchor="middle" fill="#1e40af" font-size="14" font-weight="bold" font-family="Arial, sans-serif">因子进化框架</text>
  <text x="400" y="215" text-anchor="middle" fill="#6b7280" font-size="12" font-family="Arial, sans-serif">FactorEvolution</text>
  
  <rect x="520" y="170" width="200" height="60" rx="5" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="620" y="195" text-anchor="middle" fill="#1e40af" font-size="14" font-weight="bold" font-family="Arial, sans-serif">记忆系统</text>
  <text x="620" y="215" text-anchor="middle" fill="#6b7280" font-size="12" font-family="Arial, sans-serif">Memory</text>
  
  <rect x="740" y="170" width="200" height="60" rx="5" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="840" y="195" text-anchor="middle" fill="#1e40af" font-size="14" font-weight="bold" font-family="Arial, sans-serif">审计轨迹</text>
  <text x="840" y="215" text-anchor="middle" fill="#6b7280" font-size="12" font-family="Arial, sans-serif">AuditTrail</text>
  
  <rect x="960" y="170" width="200" height="60" rx="5" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="1060" y="195" text-anchor="middle" fill="#1e40af" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Prompt路由器</text>
  <text x="1060" y="215" text-anchor="middle" fill="#6b7280" font-size="12" font-family="Arial, sans-serif">PromptRouter</text>
  
  <!-- 连接线 -->
  <line x1="700" y1="250" x2="700" y2="280" stroke="#6b7280" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- 市场抽象层 -->
  <rect x="50" y="280" width="1300" height="100" rx="10" fill="url(#abstractGradient)" stroke="#6366f1" stroke-width="2"/>
  <text x="700" y="305" text-anchor="middle" fill="#4338ca" font-size="18" font-weight="bold" font-family="Arial, sans-serif">市场抽象层 (Market Abstraction)</text>
  
  <!-- 抽象层内容 -->
  <rect x="150" y="320" width="250" height="40" rx="5" fill="white" stroke="#a5b4fc" stroke-width="1"/>
  <text x="275" y="345" text-anchor="middle" fill="#4338ca" font-size="14" font-weight="bold" font-family="Arial, sans-serif">MarketProvider (抽象基类)</text>
  
  <rect x="450" y="320" width="250" height="40" rx="5" fill="white" stroke="#a5b4fc" stroke-width="1"/>
  <text x="575" y="345" text-anchor="middle" fill="#4338ca" font-size="14" font-weight="bold" font-family="Arial, sans-serif">BaseRiskManager (抽象基类)</text>
  
  <rect x="750" y="320" width="250" height="40" rx="5" fill="white" stroke="#a5b4fc" stroke-width="1"/>
  <text x="875" y="345" text-anchor="middle" fill="#4338ca" font-size="14" font-weight="bold" font-family="Arial, sans-serif">MarketType (FUTURES/SECURITIES)</text>
  
  <!-- 连接线 -->
  <line x1="700" y1="380" x2="700" y2="410" stroke="#6b7280" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- 期货子系统 -->
  <rect x="50" y="410" width="620" height="350" rx="10" fill="url(#futuresGradient)" stroke="#f59e0b" stroke-width="2"/>
  <text x="360" y="435" text-anchor="middle" fill="#b45309" font-size="18" font-weight="bold" font-family="Arial, sans-serif">期货子系统 (Futures)</text>
  
  <!-- 期货模块 -->
  <rect x="70" y="450" width="180" height="60" rx="5" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="160" y="475" text-anchor="middle" fill="#b45309" font-size="12" font-weight="bold" font-family="Arial, sans-serif">FuturesProvider</text>
  <text x="160" y="495" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">通达信MCP</text>
  
  <rect x="260" y="450" width="180" height="60" rx="5" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="350" y="475" text-anchor="middle" fill="#b45309" font-size="12" font-weight="bold" font-family="Arial, sans-serif">FuturesMarketCtx</text>
  <text x="350" y="495" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">持仓量/基差/期限结构</text>
  
  <rect x="450" y="450" width="180" height="60" rx="5" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="540" y="475" text-anchor="middle" fill="#b45309" font-size="12" font-weight="bold" font-family="Arial, sans-serif">FuturesFactorLib</text>
  <text x="540" y="495" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">基差/库存/持仓量因子</text>
  
  <rect x="70" y="530" width="180" height="60" rx="5" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="160" y="555" text-anchor="middle" fill="#b45309" font-size="12" font-weight="bold" font-family="Arial, sans-serif">FuturesRiskMgr</text>
  <text x="160" y="575" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">保证金/杠杆/T+0</text>
  
  <rect x="260" y="530" width="180" height="60" rx="5" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="350" y="555" text-anchor="middle" fill="#b45309" font-size="12" font-weight="bold" font-family="Arial, sans-serif">期货策略</text>
  <text x="350" y="575" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">趋势/Carry/套利</text>
  
  <rect x="450" y="530" width="180" height="60" rx="5" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="540" y="555" text-anchor="middle" fill="#b45309" font-size="12" font-weight="bold" font-family="Arial, sans-serif">期货Prompt</text>
  <text x="540" y="575" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">T+0/杠杆/基差分析</text>
  
  <!-- 证券子系统 -->
  <rect x="700" y="410" width="650" height="350" rx="10" fill="url(#securitiesGradient)" stroke="#10b981" stroke-width="2"/>
  <text x="1025" y="435" text-anchor="middle" fill="#047857" font-size="18" font-weight="bold" font-family="Arial, sans-serif">证券子系统 (Securities)</text>
  
  <!-- 证券模块 -->
  <rect x="720" y="450" width="180" height="60" rx="5" fill="white" stroke="#34d399" stroke-width="1"/>
  <text x="810" y="475" text-anchor="middle" fill="#047857" font-size="12" font-weight="bold" font-family="Arial, sans-serif">SecuritiesProvider</text>
  <text x="810" y="495" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">通达信MCP</text>
  
  <rect x="910" y="450" width="180" height="60" rx="5" fill="white" stroke="#34d399" stroke-width="1"/>
  <text x="1000" y="475" text-anchor="middle" fill="#047857" font-size="12" font-weight="bold" font-family="Arial, sans-serif">SecuritiesMarketCtx</text>
  <text x="1000" y="495" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">PE/PB/ROE/财务</text>
  
  <rect x="1100" y="450" width="180" height="60" rx="5" fill="white" stroke="#34d399" stroke-width="1"/>
  <text x="1190" y="475" text-anchor="middle" fill="#047857" font-size="12" font-weight="bold" font-family="Arial, sans-serif">SecuritiesFactorLib</text>
  <text x="1190" y="495" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">估值/质量/情绪因子</text>
  
  <rect x="720" y="530" width="180" height="60" rx="5" fill="white" stroke="#34d399" stroke-width="1"/>
  <text x="810" y="555" text-anchor="middle" fill="#047857" font-size="12" font-weight="bold" font-family="Arial, sans-serif">SecuritiesRiskMgr</text>
  <text x="810" y="575" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">T+1/涨跌停/流动性</text>
  
  <rect x="910" y="530" width="180" height="60" rx="5" fill="white" stroke="#34d399" stroke-width="1"/>
  <text x="1000" y="555" text-anchor="middle" fill="#047857" font-size="12" font-weight="bold" font-family="Arial, sans-serif">证券策略</text>
  <text x="1000" y="575" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">股票/ETF/可转债/REITs</text>
  
  <rect x="1100" y="530" width="180" height="60" rx="5" fill="white" stroke="#34d399" stroke-width="1"/>
  <text x="1190" y="555" text-anchor="middle" fill="#047857" font-size="12" font-weight="bold" font-family="Arial, sans-serif">证券Prompt</text>
  <text x="1190" y="575" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">T+1/估值/财务分析</text>
  
  <!-- 可转债特殊模块 -->
  <rect x="720" y="610" width="280" height="50" rx="5" fill="white" stroke="#34d399" stroke-width="1"/>
  <text x="860" y="635" text-anchor="middle" fill="#047857" font-size="12" font-weight="bold" font-family="Arial, sans-serif">ConvertibleBondRiskMgr</text>
  <text x="860" y="650" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial, sans-serif">强赎/转股风险（关联正股）</text>
  
  <!-- 底部信息 -->
  <rect x="50" y="790" width="1300" height="80" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="700" y="815" text-anchor="middle" fill="#475569" font-size="14" font-weight="bold" font-family="Arial, sans-serif">数据源：通达信MCP（默认）</text>
  <text x="700" y="840" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, sans-serif">测试状态：659+ 个测试全部通过 | 版本：v3.0.0 | 更新：2026-06-18</text>
  
  <!-- 核心理念 -->
  <rect x="50" y="890" width="1300" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="700" y="920" text-anchor="middle" fill="#92400e" font-size="16" font-weight="bold" font-family="Arial, sans-serif">核心理念：以人为本，推理为魂，规则为果</text>
</svg>
