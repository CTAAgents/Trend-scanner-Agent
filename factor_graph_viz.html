<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因子溯源知识图 - Factor Provenance Graph</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        .header p {
            opacity: 0.8;
            font-size: 14px;
        }
        .container {
            display: flex;
            height: calc(100vh - 80px);
        }
        #graph {
            flex: 1;
            background: #16213e;
        }
        .sidebar {
            width: 300px;
            background: #1a1a2e;
            border-left: 1px solid #333;
            overflow-y: auto;
            padding: 20px;
        }
        .legend {
            margin-bottom: 20px;
        }
        .legend h3 {
            margin-bottom: 10px;
            color: #667eea;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .stats {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .stats h3 {
            margin-bottom: 10px;
            color: #667eea;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 13px;
        }
        .node-info {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
        }
        .node-info h3 {
            margin-bottom: 10px;
            color: #667eea;
        }
        .info-row {
            margin-bottom: 8px;
            font-size: 13px;
        }
        .info-label {
            color: #888;
        }
        .info-value {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>因子溯源知识图</h1>
        <p>Factor Provenance Graph - 基于 SkillWiki 论文的因子关系网络</p>
    </div>
    <div class="container">
        <div id="graph"></div>
        <div class="sidebar">
            <div class="legend">
                <h3>节点类型</h3>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4A90D9"></div>
                    <span>论文 (Paper)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #7B68EE"></div>
                    <span>因子 (Factor)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #2ECC71"></div>
                    <span>策略 (Strategy)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #F39C12"></div>
                    <span>回测 (Backtest)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #E74C3C"></div>
                    <span>市场状态 (Market)</span>
                </div>
            </div>

            <div class="legend">
                <h3>关系类型</h3>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4A90D9; width: 12px; height: 3px; border-radius: 2px;"></div>
                    <span>inspired_by</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #7B68EE; width: 12px; height: 3px; border-radius: 2px;"></div>
                    <span>evolved_from</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #2ECC71; width: 12px; height: 3px; border-radius: 2px;"></div>
                    <span>composed_with</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #95A5A6; width: 12px; height: 3px; border-radius: 2px;"></div>
                    <span>depends_on</span>
                </div>
            </div>

            <div class="stats">
                <h3>图统计</h3>
                <div class="stat-item">
                    <span class="info-label">节点总数</span>
                    <span class="info-value">10</span>
                </div>
                <div class="stat-item">
                    <span class="info-label">边总数</span>
                    <span class="info-value">6</span>
                </div>
                <div class="stat-item">
                    <span class="info-label">论文</span>
                    <span class="info-value">3</span>
                </div>
                <div class="stat-item">
                    <span class="info-label">因子</span>
                    <span class="info-value">6</span>
                </div>
                <div class="stat-item">
                    <span class="info-label">策略</span>
                    <span class="info-value">1</span>
                </div>
            </div>

            <div class="node-info" id="nodeInfo">
                <h3>节点详情</h3>
                <p style="color: #888; font-size: 13px;">点击节点查看详细信息</p>
            </div>
        </div>
    </div>

    <script>
        // 节点数据
        const nodes = [
            {id: "arxiv_2605_01300", label: "Visibility Graphs Can Make Money", color: node_colors["paper"], shape: "dot", size: 20, font: {color: "#fff", size: 12}}
{id: "arxiv_2604_26747", label: "AlphaCrafter", color: node_colors["paper"], shape: "dot", size: 20, font: {color: "#fff", size: 12}}
{id: "arxiv_2507_23392", label: "FinClaw", color: node_colors["paper"], shape: "dot", size: 20, font: {color: "#fff", size: 12}}
{id: "VGRSI_A0", label: "VGRSI均值聚合", color: node_colors["factor"], shape: "dot", size: 20, font: {color: "#fff", size: 12}}
{id: "VGRSI_A1", label: "VGRSI比率聚合", color: node_colors["factor"], shape: "dot", size: 20, font: {color: "#fff", size: 12}}
{id: "VGRSI_Multi", label: "多周期VGRSI一致性", color: node_colors["factor"], shape: "dot", size: 20, font: {color: "#fff", size: 12}}
{id: "adaptive_momentum", label: "自适应动量", color: node_colors["factor"], shape: "dot", size: 20, font: {color: "#fff", size: 12}}
{id: "volatility_adjusted_trend", label: "波动率调整趋势", color: node_colors["factor"], shape: "dot", size: 20, font: {color: "#fff", size: 12}}
{id: "volume_breakout", label: "成交量突破", color: node_colors["factor"], shape: "dot", size: 20, font: {color: "#fff", size: 12}}
{id: "trend_strategy_001", label: "EMA20+MA60多时间框架", color: node_colors["strategy"], shape: "dot", size: 20, font: {color: "#fff", size: 12}}
        ];

        // 边数据
        const edges = [
            {from: "arxiv_2605_01300", to: "VGRSI_A0", color: {color: edge_colors["inspired_by"]}, arrows: "to", label: "inspired_by", font: {size: 10, color: "#888"}}
{from: "arxiv_2605_01300", to: "VGRSI_A1", color: {color: edge_colors["inspired_by"]}, arrows: "to", label: "inspired_by", font: {size: 10, color: "#888"}}
{from: "VGRSI_A0", to: "VGRSI_Multi", color: {color: edge_colors["composed_with"]}, arrows: "to", label: "composed_with", font: {size: 10, color: "#888"}}
{from: "VGRSI_A1", to: "VGRSI_Multi", color: {color: edge_colors["composed_with"]}, arrows: "to", label: "composed_with", font: {size: 10, color: "#888"}}
{from: "VGRSI_Multi", to: "trend_strategy_001", color: {color: edge_colors["depends_on"]}, arrows: "to", label: "depends_on", font: {size: 10, color: "#888"}}
{from: "adaptive_momentum", to: "volatility_adjusted_trend", color: {color: edge_colors["evolved_from"]}, arrows: "to", label: "evolved_from", font: {size: 10, color: "#888"}}
        ];

        // 节点颜色映射
        const node_colors = {"paper": "#4A90D9", "factor": "#7B68EE", "strategy": "#2ECC71", "backtest": "#F39C12", "market": "#E74C3C"};

        // 边颜色映射
        const edge_colors = {"inspired_by": "#4A90D9", "evolved_from": "#7B68EE", "composed_with": "#2ECC71", "validated_by": "#F39C12", "degraded_in": "#E74C3C", "depends_on": "#95A5A6", "replaces": "#E67E22"};

        // 节点数据（JSON格式）
        const nodesData = [{"id": "arxiv_2605_01300", "label": "Visibility Graphs Can Make Money", "type": "paper", "attributes": {"arxiv_id": "2605.01300"}}, {"id": "arxiv_2604_26747", "label": "AlphaCrafter", "type": "paper", "attributes": {"arxiv_id": "2604.26747"}}, {"id": "arxiv_2507_23392", "label": "FinClaw", "type": "paper", "attributes": {"arxiv_id": "2507.23392"}}, {"id": "VGRSI_A0", "label": "VGRSI\u5747\u503c\u805a\u5408", "type": "factor", "attributes": {"category": "momentum", "state": "S4_released"}}, {"id": "VGRSI_A1", "label": "VGRSI\u6bd4\u7387\u805a\u5408", "type": "factor", "attributes": {"category": "momentum", "state": "S4_released"}}, {"id": "VGRSI_Multi", "label": "\u591a\u5468\u671fVGRSI\u4e00\u81f4\u6027", "type": "factor", "attributes": {"category": "momentum", "state": "S3_verified"}}, {"id": "adaptive_momentum", "label": "\u81ea\u9002\u5e94\u52a8\u91cf", "type": "factor", "attributes": {"category": "momentum", "state": "S4_released"}}, {"id": "volatility_adjusted_trend", "label": "\u6ce2\u52a8\u7387\u8c03\u6574\u8d8b\u52bf", "type": "factor", "attributes": {"category": "trend", "state": "S5_degraded"}}, {"id": "volume_breakout", "label": "\u6210\u4ea4\u91cf\u7a81\u7834", "type": "factor", "attributes": {"category": "volume", "state": "S2_draft"}}, {"id": "trend_strategy_001", "label": "EMA20+MA60\u591a\u65f6\u95f4\u6846\u67b6", "type": "strategy", "attributes": {"timeframes": ["M1", "M5", "M30"]}}];

        // 创建网络
        const container = document.getElementById('graph');
        const data = {
            nodes: new vis.DataSet(nodes),
            edges: new vis.DataSet(edges)
        };

        const options = {
            physics: {
                enabled: true,
                barnesHut: {
                    gravitationalConstant: -3000,
                    centralGravity: 0.3,
                    springLength: 150,
                    springConstant: 0.04
                }
            },
            interaction: {
                hover: true,
                tooltipDelay: 200
            },
            edges: {
                smooth: {
                    type: 'continuous'
                }
            }
        };

        const network = new vis.Network(container, data, options);

        // 点击节点显示详情
        network.on('click', function(params) {
            if (params.nodes.length > 0) {
                const nodeId = params.nodes[0];
                const nodeData = nodesData.find(n => n.id === nodeId);
                if (nodeData) {
                    const infoDiv = document.getElementById('nodeInfo');
                    let html = '<h3>节点详情</h3>';
                    html += '<div class="info-row"><span class="info-label">ID:</span> <span class="info-value">' + nodeData.id + '</span></div>';
                    html += '<div class="info-row"><span class="info-label">名称:</span> <span class="info-value">' + nodeData.label + '</span></div>';
                    html += '<div class="info-row"><span class="info-label">类型:</span> <span class="info-value">' + nodeData.type + '</span></div>';
                    if (nodeData.attributes && Object.keys(nodeData.attributes).length > 0) {
                        html += '<div class="info-row"><span class="info-label">属性:</span></div>';
                        for (const [key, value] of Object.entries(nodeData.attributes)) {
                            html += '<div class="info-row" style="padding-left: 20px;"><span class="info-label">' + key + ':</span> <span class="info-value">' + value + '</span></div>';
                        }
                    }
                    infoDiv.innerHTML = html;
                }
            }
        });
    </script>
</body>
</html>
